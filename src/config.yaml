# Pipeline configuration

generator:
  model: "claude-opus-4.6"

critic:
  models:
    - id: "claude-opus-4.6"
    - id: "gpt-5.4"
    - id: "gemini-3-pro-preview"
  # Max debate turns for disagreements
  max_turns: 3

verus:
  # Path to verus binary
  binary: "/home/chentianyu/intent_formalization/verusage/verus/verus"
  timeout_seconds: 60

# Query generation settings
generation:
  # Number of candidate queries to generate per spec function
  num_queries: 20
  # Categories to generate
  categories:
    - boundary
    - behavioral
    - logical

# Prompt template paths (relative to intent_formalization/)
prompts:
  system_role: "prompts/components/system_role.md"
  reasoning_style: "prompts/components/reasoning_style.md"
  test_gen: "prompts/consistency/test_gen.md"
  refinement: "prompts/consistency/refinement.md"
  debugger: "prompts/consistency/debugger.md"
