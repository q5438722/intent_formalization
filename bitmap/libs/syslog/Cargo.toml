[package]
name = "syslog"
version.workspace = true
license-file.workspace = true
edition.workspace = true
authors.workspace = true
description = "System Logging Library"
homepage.workspace = true

[dependencies]
cfg-if = { workspace = true, optional = true }
core = { version = "1.0.1", optional = true, package = "rustc-std-workspace-core" }
compiler_builtins = { workspace = true, optional = true }
log = { workspace = true, optional = true }
flexi_logger = { workspace = true, optional = true }
sys = { workspace = true, features = ["kcall"], optional = true }
syslog-macros = { workspace = true }

[features]
default = ["dep:cfg-if", "dep:sys"]
# Enables the use of the Rust standard library.
std = ["dep:log", "dep:flexi_logger"]
# Enables this crate to be used as a dependency of the Rust standard library.
rustc-dep-of-std = [
    "core",
    "warn",
    "cfg-if/rustc-dep-of-std",
    "compiler_builtins/rustc-dep-of-std",
    "sys/rustc-dep-of-std",
]

# Logging Features
trace = []
debug = []
info = []
warn = []
error = []
panic = []

[lints]
workspace = true
