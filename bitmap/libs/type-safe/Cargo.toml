[package]
name = "type-safe"
version.workspace = true
license-file.workspace = true
edition = "2024"
authors.workspace = true
description = "Type Safe Data Structures"
homepage.workspace = true

[lib]
crate-type = ["lib"]

[dependencies]
alloc = { version = "1.0.1", optional = true, package = "rustc-std-workspace-alloc" }
core = { version = "1.0.1", optional = true, package = "rustc-std-workspace-core" }
compiler_builtins = { workspace = true, optional = true }

[features]
default = []
std = []
rustc-dep-of-std = ["alloc", "core", "compiler_builtins/rustc-dep-of-std"]

[lints]
workspace = true
