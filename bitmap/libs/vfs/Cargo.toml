[package]
name = "vfs"
version.workspace = true
license-file.workspace = true
edition.workspace = true
authors.workspace = true
description = "Virtual file system for Nanvix guest applications"
homepage.workspace = true

[lib]
crate-type = ["lib"]

[dependencies]
error = { workspace = true }
fat32 = { workspace = true }
fatfs = { workspace = true, features = ["alloc", "lfn"] }
spin = { workspace = true, features = ["lazy", "spin_mutex"] }
sysapi = { workspace = true }

[features]
default = []
std = ["fat32/std"]

[dev-dependencies]
fatfs = { workspace = true, features = ["std", "alloc", "lfn"] }

[lints]
workspace = true
